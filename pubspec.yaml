name: focus_pro
description: >
  Focus Pro - A mobile app to strengthen user focus and reduce mindless scrolling.
  Track your focus score, read curated book snippets, play focus-enhancing games,
  and build productive habits.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Networking
  dio: ^5.3.0
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0

  # JSON
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Routing
  go_router: ^10.0.0

  # Dependency Injection
  get_it: ^7.5.0

  # Date & Time
  intl: ^0.19.0

  # Environment
  flutter_dotenv: ^5.1.0

  # UI - Only stable packages
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.65.0
  lottie: ^2.7.0

  # Notifications
  flutter_local_notifications: ^14.0.0

  # Auth
  google_sign_in: ^6.1.0

  # Utilities
  equatable: ^2.0.5
  logger: ^1.4.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/